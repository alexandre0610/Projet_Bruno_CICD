      code: |-
        test("verifier statue 200", ()=>{
          let code =res.status
          expect(200).to.equal(code)
        })

        test("verifier que la valeur attendue est egale à la valeur obtenue", ()=>{
          let nameupdate = bru.getVar("nameupdate")
          let slugupdate = bru.getVar("slugupdate")
